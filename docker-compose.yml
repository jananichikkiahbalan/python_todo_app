version: '3.9'
services:
  frontend:
    image: todo-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend
    ports:
      - "8080:80"
    networks:
      - connect-network
    depends_on:
      - backend
  trivy-frontend:
    image: aquasec/trivy
    restart: "no" 
    command: image --format table --output /home/trivydata/frontend.txt todo-frontend
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - trivy:/home/trivydata
    depends_on:
      - frontend
  backend:
    image: todo-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend 
    ports:
      - "5000:5000"
    networks:
      - connect-network
    environment:
      SECRET_NAME: "prod/todo/db-creds"
      AWS_REGION: "ap-south-1"
    depends_on:
      - database
  trivy-backend:
    image: aquasec/trivy
    restart: "no" 
    command: image --format table --output /home/trivydata/backend.txt todo-backend
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - trivy:/home/trivydata
    depends_on:
      - backend
  database:
    image: mysql:8.0.45-debian
    container_name: todo-db
    networks:
      - connect-network
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: todo_db
      MYSQL_USER: todo_user
      MYSQL_PASSWORD: todo_pass
    volumes:
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql  # ✅ auto runs on startup
volumes:
  trivy: {}
networks:
  connect-network:
    driver: bridge


