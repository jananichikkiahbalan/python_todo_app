apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: python-ingress
  labels:
    app.kubernetes.io/name: python-ingress
spec:
  rules:
  - host: todopython.com
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: frontend-service
            port: 
              number: 80
      - pathType: Prefix
        path: "/api"
        backend:
          service:
            name: backend-service
            port: 
              number: 5000
        
