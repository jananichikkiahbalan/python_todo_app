apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: {{ .Release.Name }}-mysql-networkpolicy
spec:
  podSelector:
    matchLabels:
      app: mysql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
      ports:
        - protocol: TCP
          port: 3306