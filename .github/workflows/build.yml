name: Build Docker Images

on:
  push:
    branches:
      - main



jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t backend:latest -t backend:${{ github.run_number }} ./backend
        

      - name: Build frontend image
        run: docker build --no-cache -t frontend:latest -t frontend:${{ github.run_number }} ./frontend

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: backend:latest
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend:latest
          format: table
          exit-code: 1
          severity: CRITICAL
      
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push backend image
        run: |
          docker tag backend:latest jananibalan/backend:${{ github.run_number }}
          docker push jananibalan/backend:${{ github.run_number }}

      - name: Push frontend image
        run: |
          docker tag backend:latest jananibalan/frontend:${{ github.run_number }}
          docker push jananibalan/frontend:${{ github.run_number }}
      
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker-compose pull
            docker-compose down
            docker-compose up -d